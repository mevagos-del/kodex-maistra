<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#0f0c0a" />
    <title>Кодекс Майстра — офлайн</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;

        background: #0f0c0a;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

        background: #211914;

      h1 {
        margin-top: 0;

  <body>
    <main>
      <h1>Кодекс Майстра</h1>
      <p>Немає з’єднання з мережею. Поверніться до довідника після відновлення інтернету.</p>

</html>
